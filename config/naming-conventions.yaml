elements:
  pattern: "{prefix}_{name}"    # btn_login, inp_email
  prefixes:
    button: "btn"
    input: "inp"
    link: "lnk"
    text: "txt"
    list: "lst"
    item: "itm"
    image: "img"
    checkbox: "chk"
    radio: "rdo"
    select: "sel"
    textarea: "txa"

pages:
  pattern: "{screen_name}.resource"

layouts:
  pattern: "{layout_name}.resource"

tests:
  pattern: "{feature}.robot"

keywords:
  style: "Title Case"           # Login As User
